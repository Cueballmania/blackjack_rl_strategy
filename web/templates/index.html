<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Strategy Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Blackjack Strategy Generator</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h3>Configuration</h3>
                    </div>
                    <div class="card-body">
                        <form id="configForm">
                            <h4>Game Rules</h4>
                            <div class="mb-3">
                                <label for="num_decks" class="form-label">Number of Decks</label>
                                <select class="form-control" id="num_decks" name="num_decks">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="4">4</option>
                                    <option value="6" selected>6</option>
                                    <option value="8">8</option>
                                </select>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="dealer_hit_soft_17" name="dealer_hit_soft_17" checked>
                                <label class="form-check-label" for="dealer_hit_soft_17">Dealer Hits on Soft 17</label>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="double_after_split" name="double_after_split" checked>
                                <label class="form-check-label" for="double_after_split">Double After Split</label>
                            </div>
                            
                            <div class="mb-3">
                                <label for="max_splits" class="form-label">Maximum Splits</label>
                                <select class="form-control" id="max_splits" name="max_splits">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3" selected>3</option>
                                    <option value="4">4</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Allow Double On</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="double_9" name="double_9" checked>
                                    <label class="form-check-label" for="double_9">9</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="double_10" name="double_10" checked>
                                    <label class="form-check-label" for="double_10">10</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="double_11" name="double_11" checked>
                                    <label class="form-check-label" for="double_11">11</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="double_any" name="double_any">
                                    <label class="form-check-label" for="double_any">Any Value</label>
                                </div>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="allow_surrender" name="allow_surrender">
                                <label class="form-check-label" for="allow_surrender">Allow Surrender</label>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Splitting Aces</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="resplit_aces" name="resplit_aces">
                                    <label class="form-check-label" for="resplit_aces">Allow Re-splitting Aces</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="hits_on_split_aces" name="hits_on_split_aces">
                                    <label class="form-check-label" for="hits_on_split_aces">Allow Hitting on Split Aces</label>
                                </div>
                            </div>
                            
                            <h4>Training Settings</h4>
                            <div class="mb-3">
                                <label for="algorithm" class="form-label">Algorithm</label>
                                <select class="form-control" id="algorithm" name="algorithm">
                                    <option value="q_table" selected>Q-Learning</option>
                                    <option value="dqn">Deep Q-Network</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="episodes" class="form-label">Training Episodes</label>
                                <select class="form-control" id="episodes" name="episodes">
                                    <option value="10000">10,000</option>
                                    <option value="100000" selected>100,000</option>
                                    <option value="500000">500,000</option>
                                    <option value="1000000">1,000,000</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="learning_rate" class="form-label">Learning Rate</label>
                                <input type="number" class="form-control" id="learning_rate" name="learning_rate" value="0.1" min="0.001" max="1" step="0.01">
                            </div>
                            
                            <div class="mb-3">
                                <label for="discount_factor" class="form-label">Discount Factor</label>
                                <input type="number" class="form-control" id="discount_factor" name="discount_factor" value="0.95" min="0" max="1" step="0.01">
                            </div>
                            
                            <div class="mb-3">
                                <label for="count_levels" class="form-label">Count Levels to Generate</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="count_0" name="count_0" checked>
                                    <label class="form-check-label" for="count_0">0 (Basic Strategy)</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="count_neg2" name="count_neg2">
                                    <label class="form-check-label" for="count_neg2">-2</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="count_neg1" name="count_neg1">
                                    <label class="form-check-label" for="count_neg1">-1</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="count_1" name="count_1">
                                    <label class="form-check-label" for="count_1">+1</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="count_2" name="count_2">
                                    <label class="form-check-label" for="count_2">+2</label>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Train Model</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h3>Training Progress</h3>
                    </div>
                    <div class="card-body">
                        <div id="trainingStatus" class="mb-3">
                            <p>Status: <span id="statusText">Idle</span></p>
                            <div class="progress">
                                <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                            </div>
                            <p id="trainingMessage" class="mt-2"></p>
                        </div>
                    </div>
                </div>
                
                <div id="resultsSection" style="display: none;">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h3>Results</h3>
                        </div>
                        <div class="card-body">
                            <p>Average Reward: <span id="avgReward"></span></p>
                            
                            <div class="mb-3">
                                <label for="countSelect" class="form-label">Select Count Level:</label>
                                <select id="countSelect" class="form-control"></select>
                            </div>
                            
                            <ul class="nav nav-tabs" id="strategyTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="hard-tab" data-bs-toggle="tab" data-bs-target="#hard" type="button" role="tab" aria-controls="hard" aria-selected="true">Hard Totals</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="soft-tab" data-bs-toggle="tab" data-bs-target="#soft" type="button" role="tab" aria-controls="soft" aria-selected="false">Soft Totals</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="pairs-tab" data-bs-toggle="tab" data-bs-target="#pairs" type="button" role="tab" aria-controls="pairs" aria-selected="false">Pair Splitting</button>
                                </li>
                            </ul>
                            
                            <div class="tab-content" id="strategyTabsContent">
                                <div class="tab-pane fade show active" id="hard" role="tabpanel" aria-labelledby="hard-tab">
                                    <div class="strategy-table-container">
                                        <!-- Strategy table will be inserted here -->
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="soft" role="tabpanel" aria-labelledby="soft-tab">
                                    <div class="strategy-table-container">
                                        <!-- Strategy table will be inserted here -->
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="pairs" role="tabpanel" aria-labelledby="pairs-tab">
                                    <div class="strategy-table-container">
                                        <!-- Strategy table will be inserted here -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
