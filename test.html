<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('testBtn').addEventListener('click', function() {
                fetch('http://127.0.0.1:5008/api/training_results')
                    .then(response => response.text())
                    .then(text => {
                        console.log('Response length:', text.length);
                        console.log('First 100 chars:', text.substring(0, 100));
                        try {
                            const data = JSON.parse(text);
                            document.getElementById('result').textContent = 'JSON parsed successfully! Average reward: ' + data.avg_reward;
                        } catch (e) {
                            document.getElementById('result').textContent = 'Error parsing JSON: ' + e.message;
                            document.getElementById('rawData').textContent = 'Raw data (first 500 chars): ' + text.substring(0, 500);
                        }
                    })
                    .catch(error => {
                        document.getElementById('result').textContent = 'Fetch error: ' + error.message;
                    });
            });
        });
    </script>
</head>
<body>
    <h1>Test Fetch</h1>
    <button id="testBtn">Fetch Training Results</button>
    <div id="result" style="margin-top: 20px;"></div>
    <pre id="rawData" style="margin-top: 20px; background-color: #f0f0f0; padding: 10px;"></pre>
</body>
</html>
